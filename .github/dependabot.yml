version: 2
updates:
  # GitHub Actions: keep SHA-pinned uses refs fresh; batch one PR/week to avoid
  # notification spam. Major upgrades are low-risk here because we review the
  # diff manually before merging.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 3
    labels: ['dependencies', 'github-actions', 'security']
    commit-message:
      # Keep the full conventional-commits prefix here (e.g. "chore(deps)").
      # Do NOT also set `include: 'scope'` — dependabot would then emit
      # `chore(deps)(deps): ...` and commitlint would reject it.
      prefix: 'chore(deps)'
    groups:
      all-actions:
        patterns: ['*']
        update-types: ['major', 'minor', 'patch']
