name: test-install

on:
  pull_request:
    branches: ['main']
    paths:
      - 'scripts/**'
      - 'registry.json'
      - 'skills/**'
      - '.github/workflows/test-install.yml'
  push:
    branches: ['main']
    paths:
      - 'scripts/**'
      - 'registry.json'
      - 'skills/**'
      - '.github/workflows/test-install.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unix:
    name: install.sh (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Harden the runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Dry-run (online, all agents, list action)
        env:
          SKILLS_INSTALLER_REPO: ${{ github.repository }}
          SKILLS_INSTALLER_REF:  ${{ github.head_ref || github.ref_name }}
        run: bash scripts/install.sh --list --agent=cursor --scope=global

      - name: Dry-run (online, install MIT subset, dry-run)
        env:
          SKILLS_INSTALLER_REPO: ${{ github.repository }}
          SKILLS_INSTALLER_REF:  ${{ github.head_ref || github.ref_name }}
        run: bash scripts/install.sh --dry-run --agent=cursor --skills=find-skills,superpowers,ui-ux-pro-max

      - name: Install offline MIT subset to tmp Cursor dir
        env:
          HOME: ${{ runner.temp }}/agent-home
          SKILLS_INSTALLER_REPO: ${{ github.repository }}
          SKILLS_INSTALLER_REF:  ${{ github.head_ref || github.ref_name }}
        run: |
          mkdir -p "$HOME/.cursor"
          bash scripts/install.sh --offline --yes \
            --agent=cursor \
            --skills=find-skills,superpowers,ui-ux-pro-max
          test -f "$HOME/.cursor/skills/find-skills/SKILL.md"
          test -f "$HOME/.cursor/skills/ui-ux-pro-max/SKILL.md"
          test -d "$HOME/.cursor/skills/superpowers"
          test -f "$HOME/.cursor/skills/.skills-installer.json"

      - name: Uninstall from tmp Cursor dir
        env:
          HOME: ${{ runner.temp }}/agent-home
        run: |
          bash scripts/install.sh --uninstall --yes \
            --agent=cursor \
            --skills=find-skills,superpowers,ui-ux-pro-max
          test ! -d "$HOME/.cursor/skills/find-skills"
          test ! -d "$HOME/.cursor/skills/superpowers"

  windows:
    name: install.ps1 (windows)
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Dry-run (list)
        shell: pwsh
        env:
          SKILLS_INSTALLER_REPO: ${{ github.repository }}
          SKILLS_INSTALLER_REF:  ${{ github.head_ref || github.ref_name }}
        run: .\scripts\install.ps1 -Action list -Agent cursor -Scope global

      - name: Dry-run (offline MIT subset)
        shell: pwsh
        env:
          SKILLS_INSTALLER_REPO: ${{ github.repository }}
          SKILLS_INSTALLER_REF:  ${{ github.head_ref || github.ref_name }}
        run: .\scripts\install.ps1 -DryRun -Offline -Agent cursor -Skills find-skills,superpowers,ui-ux-pro-max

      - name: Install offline MIT subset
        shell: pwsh
        env:
          USERPROFILE: ${{ runner.temp }}\agent-home
          SKILLS_INSTALLER_REPO: ${{ github.repository }}
          SKILLS_INSTALLER_REF:  ${{ github.head_ref || github.ref_name }}
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.cursor" | Out-Null
          .\scripts\install.ps1 -Offline -Yes -Agent cursor -Skills find-skills,superpowers,ui-ux-pro-max
          if (-not (Test-Path "$env:USERPROFILE\.cursor\skills\find-skills\SKILL.md")) { throw "find-skills missing" }
          if (-not (Test-Path "$env:USERPROFILE\.cursor\skills\ui-ux-pro-max\SKILL.md")) { throw "ui-ux-pro-max missing" }
          if (-not (Test-Path "$env:USERPROFILE\.cursor\skills\superpowers")) { throw "superpowers missing" }
          if (-not (Test-Path "$env:USERPROFILE\.cursor\skills\.skills-installer.json")) { throw "manifest missing" }
