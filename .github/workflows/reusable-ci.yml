# ============================================================
# Enterprise-grade Reusable CI & Security Workflow
# Repo : 2029193370/ci-templates
# Path : .github/workflows/reusable-ci.yml
#
# Consumer usage (in your project's .github/workflows/ci.yml):
#   jobs:
#     ci:
#       uses: 2029193370/ci-templates/.github/workflows/reusable-ci.yml@v2
#
# Pipeline layout:
#   Layer 0 - Repo hygiene (compiled artefacts / conflict markers / secrets / big files)
#   Layer 1 - Code quality (lint + build + test + coverage, language-dispatched & parallel)
#   Layer 2 - Security (Trivy vuln + secret, Hadolint, Checkov IaC, license)
#   Layer 3 - Artifacts (coverage upload, SBOM attestation ready)
#
# Supply-chain hardening:
# - Every third-party action is pinned by commit SHA
# - Every job runs step-security/harden-runner at startup
# - Trivy pinned past the 2026-03 supply-chain attack
# Supported stacks: Node.js / TS - Java - PHP - Python - Go - .NET - Docker
# ============================================================

name: Reusable CI & Security

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version (single) - ignored when node-versions is set'
        required: false
        type: string
        default: '22'
      node-versions:
        description: 'JSON array of Node.js versions to matrix-test, e.g. "[20,22]"'
        required: false
        type: string
        default: ''
      java-version:
        description: 'Java version (LTS 17 or 21)'
        required: false
        type: string
        default: '17'
      php-version:
        description: 'PHP version'
        required: false
        type: string
        default: '8.2'
      python-version:
        description: 'Python version (single)'
        required: false
        type: string
        default: '3.11'
      python-versions:
        description: 'JSON array of Python versions to matrix-test, e.g. "[3.11,3.12]"'
        required: false
        type: string
        default: ''
      go-version:
        description: 'Go version'
        required: false
        type: string
        default: '1.22'
      dotnet-version:
        description: '.NET SDK version'
        required: false
        type: string
        default: '8.0'
      trivy-severity:
        description: 'Trivy severity threshold'
        required: false
        type: string
        default: 'CRITICAL,HIGH'
      trivy-exit-code:
        description: 'Exit code when Trivy finds issues (1 fail, 0 report only)'
        required: false
        type: string
        default: '1'
      enable-checkov:
        description: 'Run Checkov IaC scan when Terraform/K8s/Dockerfile present'
        required: false
        type: boolean
        default: true
      enable-license-scan:
        description: 'Run REUSE (SPDX) license compliance scan'
        required: false
        type: boolean
        default: false
      fail-fast-on-hygiene:
        description: 'Whether Layer 0 failure blocks subsequent layers'
        required: false
        type: boolean
        default: false
      harden-runner-policy:
        description: 'step-security/harden-runner egress policy: audit or block'
        required: false
        type: string
        default: 'audit'
    secrets:
      CODECOV_TOKEN:
        description: 'Optional Codecov upload token. When set, coverage upload is enabled.'
        required: false

permissions:
  contents: read

jobs:
  # ==========================================
  # Layer 0: Repo hygiene
  # ==========================================
  repo-hygiene:
    name: Layer 0 - Repo Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Repo hygiene check
        run: |
          errors=0
          warnings=0

          echo "========== Build artifacts =========="
          for dir in node_modules __pycache__ .next .nuxt .gradle .pytest_cache dist build target out; do
            if [ -d "$dir" ]; then
              echo "::error::Committed build dir: $dir/ - add to .gitignore and run: git rm -r --cached $dir"
              errors=$((errors + 1))
            fi
          done

          if find . -maxdepth 4 -name "*.pyc" -not -path "./.git/*" -not -path "./node_modules/*" -print -quit 2>/dev/null | grep -q .; then
            echo "::error::Found *.pyc - add *.pyc and __pycache__/ to .gitignore"
            errors=$((errors + 1))
          fi

          if find . -maxdepth 4 -name "*.class" -not -path "./.git/*" -not -path "./node_modules/*" -print -quit 2>/dev/null | grep -q .; then
            echo "::error::Found *.class - add *.class to .gitignore"
            errors=$((errors + 1))
          fi

          echo ""
          echo "========== Merge conflict markers =========="
          conflicts=$(git grep -nI -E '^(<<<<<<< |=======$|>>>>>>> )' -- ':!*.lock' ':!*.min.*' 2>/dev/null || true)
          if [ -n "$conflicts" ]; then
            echo "$conflicts" | head -20
            echo "::error::Unresolved merge conflict markers detected"
            errors=$((errors + 1))
          fi

          echo ""
          echo "========== Sensitive files =========="
          for envfile in .env .env.local .env.development .env.production; do
            if [ -f "$envfile" ]; then
              echo "::warning::Detected $envfile - may contain secrets"
              warnings=$((warnings + 1))
            fi
          done

          if find . -maxdepth 3 \( -name "*.pem" -o -name "*.key" -o -name "*.p12" -o -name "*.pfx" \) -not -path './.git/*' 2>/dev/null | head -1 | grep -q .; then
            echo "::warning::Certificate/private key files detected"
            warnings=$((warnings + 1))
          fi

          echo ""
          echo "========== Large files (>5MB) =========="
          large_files=$(find . -not -path './.git/*' -not -path './node_modules/*' -not -path './vendor/*' -type f -size +5M 2>/dev/null || true)
          if [ -n "$large_files" ]; then
            echo "::warning::Files over 5MB found - consider Git LFS:"
            echo "$large_files" | while IFS= read -r f; do
              size=$(du -h "$f" | cut -f1)
              echo "  $size  $f"
            done
            warnings=$((warnings + 1))
          fi

          echo ""
          echo "Result: ${errors} error(s), ${warnings} warning(s)"
          if [ $errors -gt 0 ]; then exit 1; fi

  # ==========================================
  # Layer 1: Code quality - one job per stack
  # ==========================================

  # ---------- Node.js ----------
  node-matrix:
    name: Layer 1 - Node.js (${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: repo-hygiene
    timeout-minutes: 20
    if: ${{ !cancelled() && (!inputs.fail-fast-on-hygiene || needs.repo-hygiene.result == 'success') }}
    strategy:
      fail-fast: false
      matrix:
        node: ${{ fromJSON(inputs.node-versions != '' && inputs.node-versions || format('[{0}]', toJSON(inputs.node-version))) }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Detect Node.js project
        id: detect
        shell: bash
        run: |
          manifest=''
          if [ -f package.json ]; then
            manifest='package.json'
          else
            manifest="$(find . -maxdepth 4 \
              \( -path '*/node_modules/*' -o -path '*/.git/*' \) -prune -o \
              -mindepth 2 \
              -name 'package.json' -print 2>/dev/null | LC_ALL=C sort | head -n1)"
          fi

          if [ -n "$manifest" ]; then
            project_dir="$(dirname "$manifest")"
            [ "$project_dir" = "." ] || project_dir="${project_dir#./}"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "project_dir=$project_dir" >> "$GITHUB_OUTPUT"
            echo "manifest_path=$manifest" >> "$GITHUB_OUTPUT"
            if [ -f "$project_dir/package-lock.json" ]; then
              echo "has_lockfile=true" >> "$GITHUB_OUTPUT"
              echo "lockfile_path=$project_dir/package-lock.json" >> "$GITHUB_OUTPUT"
            else
              echo "has_lockfile=false" >> "$GITHUB_OUTPUT"
            fi
            echo "Using Node.js project in $project_dir"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No package.json - skipping"
          fi

      - name: Setup Node.js (cached)
        if: steps.detect.outputs.found == 'true' && steps.detect.outputs.has_lockfile == 'true'
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: ${{ steps.detect.outputs.lockfile_path }}

      - name: Setup Node.js
        if: steps.detect.outputs.found == 'true' && steps.detect.outputs.has_lockfile != 'true'
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ matrix.node }}

      - name: Install, lint, build, test
        if: steps.detect.outputs.found == 'true'
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci || { echo "::error::npm ci failed"; exit 1; }
          else
            echo "::warning::no package-lock.json, falling back to npm install"
            npm install
          fi
          failed=0
          npm run lint  --if-present || { echo "::error::Node lint failed";  failed=1; }
          npm run build --if-present || { echo "::error::Node build failed"; failed=1; }
          npm test      --if-present -- --ci --reporters=default \
            || npm test --if-present \
            || { echo "::error::Node test failed"; failed=1; }
          exit $failed

      - name: Upload coverage
        if: steps.detect.outputs.found == 'true' && always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage-node-${{ matrix.node }}
          path: ${{ steps.detect.outputs.project_dir }}/coverage/
          retention-days: 7
          if-no-files-found: ignore

  # ---------- Java ----------
  java-check:
    name: Layer 1 - Java
    runs-on: ubuntu-latest
    needs: repo-hygiene
    timeout-minutes: 25
    if: ${{ !cancelled() && (!inputs.fail-fast-on-hygiene || needs.repo-hygiene.result == 'success') }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Detect Java project
        id: detect
        shell: bash
        run: |
          maven=false
          gradle=false
          maven_path=''
          gradle_path=''

          if [ -f pom.xml ]; then
            maven_path='pom.xml'
          else
            maven_path="$(find . -maxdepth 5 \
              \( -path '*/node_modules/*' -o -path '*/.git/*' \) -prune -o \
              -mindepth 2 \
              -name 'pom.xml' -print 2>/dev/null | LC_ALL=C sort | head -n1)"
          fi

          if [ -f build.gradle ]; then
            gradle_path='build.gradle'
          elif [ -f build.gradle.kts ]; then
            gradle_path='build.gradle.kts'
          else
            gradle_path="$(find . -maxdepth 5 \
              \( -path '*/node_modules/*' -o -path '*/.git/*' \) -prune -o \
              -mindepth 2 \
              \( -name 'build.gradle' -o -name 'build.gradle.kts' \) -print 2>/dev/null | LC_ALL=C sort | head -n1)"
          fi

          if [ -n "$maven_path" ]; then
            maven=true
            maven_dir="$(dirname "$maven_path")"
            [ "$maven_dir" = "." ] || maven_dir="${maven_dir#./}"
            echo "maven_dir=$maven_dir" >> "$GITHUB_OUTPUT"
            echo "Using Maven project in $maven_dir"
          fi

          if [ -n "$gradle_path" ]; then
            gradle=true
            gradle_dir="$(dirname "$gradle_path")"
            [ "$gradle_dir" = "." ] || gradle_dir="${gradle_dir#./}"
            echo "gradle_dir=$gradle_dir" >> "$GITHUB_OUTPUT"
            echo "Using Gradle project in $gradle_dir"
          fi

          echo "maven=$maven"   >> "$GITHUB_OUTPUT"
          echo "gradle=$gradle" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        if: steps.detect.outputs.maven == 'true' || steps.detect.outputs.gradle == 'true'
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'

      - name: Cache Maven
        if: steps.detect.outputs.maven == 'true'
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}-

      - name: Cache Gradle
        if: steps.detect.outputs.gradle == 'true'
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Maven verify
        if: steps.detect.outputs.maven == 'true'
        working-directory: ${{ steps.detect.outputs.maven_dir }}
        run: |
          if [ -f mvnw ]; then chmod +x mvnw && ./mvnw -B -ntp verify; else mvn -B -ntp verify; fi

      - name: Gradle check+assemble
        if: steps.detect.outputs.maven == 'false' && steps.detect.outputs.gradle == 'true'
        working-directory: ${{ steps.detect.outputs.gradle_dir }}
        run: |
          if [ -f gradlew ]; then chmod +x gradlew && ./gradlew check assemble --no-daemon; else gradle check assemble --no-daemon; fi

      - name: Upload Java coverage (JaCoCo)
        if: always() && hashFiles('**/target/site/jacoco/jacoco.xml', '**/build/reports/jacoco/**/jacoco.xml') != ''
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage-java
          path: |
            **/target/site/jacoco/
            **/build/reports/jacoco/
          retention-days: 7
          if-no-files-found: ignore

  # ---------- PHP ----------
  php-check:
    name: Layer 1 - PHP
    runs-on: ubuntu-latest
    needs: repo-hygiene
    timeout-minutes: 20
    if: ${{ !cancelled() && (!inputs.fail-fast-on-hygiene || needs.repo-hygiene.result == 'success') }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Detect PHP project
        id: detect
        shell: bash
        run: |
          composer_path=''
          project_dir='.'
          has_composer=false

          if [ -f composer.json ]; then
            composer_path='composer.json'
          else
            composer_path="$(find . -maxdepth 5 \
              \( -path '*/vendor/*' -o -path '*/node_modules/*' -o -path '*/.git/*' \) -prune -o \
              -mindepth 2 \
              -name 'composer.json' -print 2>/dev/null | LC_ALL=C sort | head -n1)"
          fi

          if [ -n "$composer_path" ]; then
            has_composer=true
            project_dir="$(dirname "$composer_path")"
            [ "$project_dir" = "." ] || project_dir="${project_dir#./}"
          elif find . -maxdepth 5 \
              \( -path '*/vendor/*' -o -path '*/node_modules/*' -o -path '*/.git/*' \) -prune -o \
              -name '*.php' -print -quit 2>/dev/null | grep -q .; then
            :
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No PHP files - skipping"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "project_dir=$project_dir" >> "$GITHUB_OUTPUT"
          echo "has_composer=$has_composer" >> "$GITHUB_OUTPUT"
          if [ -f "$project_dir/composer.lock" ]; then
            echo "has_lockfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_lockfile=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Using PHP project in $project_dir"

      - name: Setup PHP
        if: steps.detect.outputs.found == 'true'
        uses: shivammathur/setup-php@c541c155eee45413f5b09a52248675b1a2575231 # 2.31.1
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Cache Composer
        if: steps.detect.outputs.has_composer == 'true' && steps.detect.outputs.has_lockfile == 'true'
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ${{ steps.detect.outputs.project_dir }}/vendor
          key: composer-${{ runner.os }}-php${{ inputs.php-version }}-${{ steps.detect.outputs.project_dir }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-php${{ inputs.php-version }}-

      - name: Install, syntax-check, test
        if: steps.detect.outputs.found == 'true'
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: |
          failed=0
          if [ -f composer.json ]; then
            composer install --no-interaction --prefer-dist --optimize-autoloader \
              || { echo "::error::Composer install failed"; failed=1; }
          fi
          find . -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" -print0 2>/dev/null \
            | xargs -0 -r -P"$(nproc)" -n1 php -l \
            || { echo "::error::PHP syntax check failed"; failed=1; }

          if [ -f composer.json ] && composer run-script --list 2>/dev/null | grep -q '^  test'; then
            composer run-script test || { echo "::error::PHP test failed"; failed=1; }
          elif [ -x vendor/bin/phpunit ]; then
            vendor/bin/phpunit || { echo "::error::PHPUnit failed"; failed=1; }
          fi
          exit $failed

  # ---------- Python ----------
  python-matrix:
    name: Layer 1 - Python (${{ matrix.py }})
    runs-on: ubuntu-latest
    needs: repo-hygiene
    timeout-minutes: 20
    if: ${{ !cancelled() && (!inputs.fail-fast-on-hygiene || needs.repo-hygiene.result == 'success') }}
    strategy:
      fail-fast: false
      matrix:
        py: ${{ fromJSON(inputs.python-versions != '' && inputs.python-versions || format('[{0}]', toJSON(inputs.python-version))) }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Detect Python project
        id: detect
        shell: bash
        run: |
          manifest=''
          if [ -f pyproject.toml ]; then
            manifest='pyproject.toml'
          elif [ -f requirements.txt ]; then
            manifest='requirements.txt'
          elif [ -f setup.py ]; then
            manifest='setup.py'
          elif [ -f Pipfile ]; then
            manifest='Pipfile'
          else
            manifest="$(find . -maxdepth 4 \
              \( -path '*/.git/*' -o -path '*/node_modules/*' -o -path '*/.venv/*' -o -path '*/venv/*' \) -prune -o \
              -mindepth 2 \
              \( -name 'pyproject.toml' -o -name 'requirements.txt' -o -name 'setup.py' -o -name 'Pipfile' \) -print 2>/dev/null | LC_ALL=C sort | head -n1)"
          fi

          if [ -n "$manifest" ]; then
            project_dir="$(dirname "$manifest")"
            [ "$project_dir" = "." ] || project_dir="${project_dir#./}"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "project_dir=$project_dir" >> "$GITHUB_OUTPUT"
            echo "manifest_path=$manifest" >> "$GITHUB_OUTPUT"
            echo "Using Python project in $project_dir"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.detect.outputs.found == 'true'
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ matrix.py }}

      - name: Lint + test + coverage
        if: steps.detect.outputs.found == 'true'
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8 pytest pytest-cov coverage

          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f pyproject.toml ] || [ -f setup.py ]; then python -m pip install -e .; fi

          failed=0
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            || { echo "::error::Flake8 fatal issues"; failed=1; }

          if [ -d tests ] || find . -maxdepth 3 \( -name 'test_*.py' -o -name '*_test.py' \) -print -quit 2>/dev/null | grep -q .; then
            pytest --cov=. --cov-report=xml --cov-report=term || { echo "::error::pytest failed"; failed=1; }
          else
            echo "No pytest tests detected - skipping"
          fi
          exit $failed

      - name: Upload Python coverage
        if: steps.detect.outputs.found == 'true'
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage-python-${{ matrix.py }}
          path: ${{ steps.detect.outputs.project_dir }}/coverage.xml
          retention-days: 7
          if-no-files-found: ignore

  # ---------- Go ----------
  go-check:
    name: Layer 1 - Go
    runs-on: ubuntu-latest
    needs: repo-hygiene
    timeout-minutes: 20
    if: ${{ !cancelled() && (!inputs.fail-fast-on-hygiene || needs.repo-hygiene.result == 'success') }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Detect Go project
        id: detect
        shell: bash
        run: |
          manifest=''
          if [ -f go.mod ]; then
            manifest='go.mod'
          else
            manifest="$(find . -maxdepth 5 \
              \( -path '*/.git/*' -o -path '*/node_modules/*' \) -prune -o \
              -mindepth 2 \
              -name 'go.mod' -print 2>/dev/null | LC_ALL=C sort | head -n1)"
          fi

          if [ -n "$manifest" ]; then
            project_dir="$(dirname "$manifest")"
            [ "$project_dir" = "." ] || project_dir="${project_dir#./}"
            cache_path="$project_dir/go.mod"
            if [ -f "$project_dir/go.sum" ]; then
              cache_path="$project_dir/go.sum"
            fi
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "project_dir=$project_dir" >> "$GITHUB_OUTPUT"
            echo "cache_path=$cache_path" >> "$GITHUB_OUTPUT"
            echo "Using Go project in $project_dir"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        if: steps.detect.outputs.found == 'true'
        uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
          cache-dependency-path: ${{ steps.detect.outputs.cache_path }}

      - name: Vet, build, test
        if: steps.detect.outputs.found == 'true'
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: |
          failed=0
          go vet ./...     || { echo "::error::go vet failed";   failed=1; }
          go build ./...   || { echo "::error::go build failed"; failed=1; }
          go test -race -coverprofile=coverage.out -covermode=atomic ./... \
            || { echo "::error::go test failed"; failed=1; }
          exit $failed

      - name: Upload Go coverage
        if: steps.detect.outputs.found == 'true'
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage-go
          path: ${{ steps.detect.outputs.project_dir }}/coverage.out
          retention-days: 7
          if-no-files-found: ignore

  # ---------- .NET ----------
  dotnet-check:
    name: Layer 1 - .NET
    runs-on: ubuntu-latest
    needs: repo-hygiene
    timeout-minutes: 25
    if: ${{ !cancelled() && (!inputs.fail-fast-on-hygiene || needs.repo-hygiene.result == 'success') }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Detect .NET project
        id: detect
        shell: bash
        run: |
          entry_path=''

          entry_path="$(find . -maxdepth 1 -name '*.sln' -print 2>/dev/null | LC_ALL=C sort | head -n1)"
          if [ -z "$entry_path" ]; then
            entry_path="$(find . -maxdepth 1 \( -name '*.csproj' -o -name '*.fsproj' \) -print 2>/dev/null | LC_ALL=C sort | head -n1)"
          fi
          if [ -z "$entry_path" ]; then
            entry_path="$(find . -maxdepth 5 \
              \( -path '*/.git/*' -o -path '*/node_modules/*' -o -path '*/bin/*' -o -path '*/obj/*' \) -prune -o \
              -mindepth 2 \
              \( -name '*.sln' -o -name '*.csproj' -o -name '*.fsproj' \) -print 2>/dev/null | LC_ALL=C sort | head -n1)"
          fi

          if [ -n "$entry_path" ]; then
            project_dir="$(dirname "$entry_path")"
            [ "$project_dir" = "." ] || project_dir="${project_dir#./}"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "project_dir=$project_dir" >> "$GITHUB_OUTPUT"
            echo "entry_name=$(basename "$entry_path")" >> "$GITHUB_OUTPUT"
            echo "Using .NET project in $project_dir"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        if: steps.detect.outputs.found == 'true'
        uses: actions/setup-dotnet@87b7050bc53ea08284295505d98d2aa94301e852 # v4.2.0
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Restore, build, test
        if: steps.detect.outputs.found == 'true'
        working-directory: ${{ steps.detect.outputs.project_dir }}
        env:
          DOTNET_ENTRY: ${{ steps.detect.outputs.entry_name }}
        run: |
          dotnet restore "$DOTNET_ENTRY"                         || { echo "::error::.NET restore failed"; exit 1; }
          dotnet build "$DOTNET_ENTRY" --no-restore --configuration Release \
            || { echo "::error::.NET build failed"; exit 1; }
          dotnet test "$DOTNET_ENTRY" --no-build --configuration Release \
            --collect:"XPlat Code Coverage" \
            --logger:"trx" || { echo "::error::.NET test failed"; exit 1; }

      - name: Upload .NET coverage
        if: steps.detect.outputs.found == 'true'
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage-dotnet
          path: '**/TestResults/**/coverage.cobertura.xml'
          retention-days: 7
          if-no-files-found: ignore

  # ---------- Docker / Dockerfile ----------
  docker-check:
    name: Layer 1 - Dockerfile
    runs-on: ubuntu-latest
    needs: repo-hygiene
    timeout-minutes: 10
    if: ${{ !cancelled() && (!inputs.fail-fast-on-hygiene || needs.repo-hygiene.result == 'success') }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Detect Dockerfile
        id: detect
        run: |
          if find . -maxdepth 5 \( -iname 'Dockerfile' -o -iname 'Dockerfile.*' \) -print -quit 2>/dev/null | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Hadolint
        if: steps.detect.outputs.found == 'true'
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          recursive: true
          failure-threshold: warning

  # ---------- Aggregator ----------
  layer1-aggregate:
    name: Layer 1 - Aggregate
    runs-on: ubuntu-latest
    needs: [node-matrix, java-check, php-check, python-matrix, go-check, dotnet-check, docker-check]
    if: ${{ always() }}
    steps:
      - name: Summarise
        env:
          NODE_R: ${{ needs.node-matrix.result }}
          JAVA_R: ${{ needs.java-check.result }}
          PHP_R: ${{ needs.php-check.result }}
          PY_R: ${{ needs.python-matrix.result }}
          GO_R: ${{ needs.go-check.result }}
          NET_R: ${{ needs.dotnet-check.result }}
          DOCKER_R: ${{ needs.docker-check.result }}
        run: |
          echo "=== Layer 1 Summary ==="
          failed=""
          [ "$NODE_R"   = "failure" ] && failed="${failed}  - Node failed\n"
          [ "$JAVA_R"   = "failure" ] && failed="${failed}  - Java failed\n"
          [ "$PHP_R"    = "failure" ] && failed="${failed}  - PHP failed\n"
          [ "$PY_R"     = "failure" ] && failed="${failed}  - Python failed\n"
          [ "$GO_R"     = "failure" ] && failed="${failed}  - Go failed\n"
          [ "$NET_R"    = "failure" ] && failed="${failed}  - .NET failed\n"
          [ "$DOCKER_R" = "failure" ] && failed="${failed}  - Dockerfile failed\n"
          if [ -n "$failed" ]; then
            printf "\nFailed:\n%b\n" "$failed"
            echo "::error::Layer 1 has failing checks"
            exit 1
          fi
          echo "All Layer 1 checks passed"

  # ==========================================
  # Layer 2: Security
  # ==========================================
  security-trivy:
    name: Layer 2 - Trivy (vuln + secret)
    runs-on: ubuntu-latest
    needs: layer1-aggregate
    permissions:
      contents: read
      security-events: write
    if: ${{ !cancelled() }}
    timeout-minutes: 15
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: 'fs'
          scanners: 'vuln,secret'
          ignore-unfixed: true
          format: 'table'
          severity: ${{ inputs.trivy-severity }}
          exit-code: ${{ inputs.trivy-exit-code }}

  security-iac:
    name: Layer 2 - Checkov (IaC)
    runs-on: ubuntu-latest
    needs: repo-hygiene
    permissions:
      contents: read
      security-events: write
    if: ${{ !cancelled() && inputs.enable-checkov }}
    timeout-minutes: 15
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Detect IaC files
        id: detect
        run: |
          if find . -maxdepth 6 \
              \( -name '*.tf' -o -name '*.tfvars' \
                 -o -iname 'Dockerfile' -o -iname 'Dockerfile.*' \
                 -o -name '*.yaml' -o -name '*.yml' \) \
              -not -path './.git/*' -not -path './node_modules/*' \
              -print -quit 2>/dev/null | grep -q .; then
            echo "found=true"  >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkov
        if: steps.detect.outputs.found == 'true'
        uses: bridgecrewio/checkov-action@33dbb953e9f9e28d92903b9c214f4072e6c7fd07 # v12.2969.0
        with:
          framework: terraform,kubernetes,dockerfile,secrets,github_actions
          soft_fail: true
          quiet: true
          output_format: cli,sarif
          output_file_path: 'console,results.sarif'

      - name: Upload Checkov SARIF
        if: steps.detect.outputs.found == 'true' && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: results.sarif
          category: checkov

  security-license:
    name: Layer 2 - License (REUSE)
    runs-on: ubuntu-latest
    needs: repo-hygiene
    if: ${{ !cancelled() && inputs.enable-license-scan }}
    timeout-minutes: 10
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: REUSE compliance check
        uses: fsfe/reuse-action@bb774aa972c2a89ff34781233d275075cbddf542 # v5.0.0

  # ==========================================
  # Layer 3: Coverage upload (optional)
  # ==========================================
  upload-coverage:
    name: Layer 3 - Upload Coverage
    runs-on: ubuntu-latest
    needs: layer1-aggregate
    if: ${{ !cancelled() && needs.layer1-aggregate.result == 'success' }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: ${{ inputs.harden-runner-policy }}

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Download coverage artifacts
        id: download
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        continue-on-error: true
        with:
          pattern: coverage-*
          merge-multiple: true
          path: coverage

      - name: Check Codecov token
        id: token
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [ -n "${CODECOV_TOKEN}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "CODECOV_TOKEN not set - skipping upload"
          fi

      - name: Upload to Codecov
        if: steps.token.outputs.present == 'true' && steps.download.outcome == 'success'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          directory: coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
