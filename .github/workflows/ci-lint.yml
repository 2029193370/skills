name: CI - YAML Lint

on:
  pull_request:
    branches: ['main']
    paths:
      - '.github/workflows/**'
      - '.yamllint'
      - '.yamllint.yml'
      - 'starter/**'
  push:
    branches: ['main']
    paths:
      - '.github/workflows/**'
      - '.yamllint'
      - '.yamllint.yml'
      - 'starter/**'

permissions:
  contents: read

jobs:
  yamllint:
    name: Yamllint for workflow files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Normalize workflow line endings (CRLF -> LF)
        run: |
          find .github/workflows -type f \( -name "*.yml" -o -name "*.yaml" \) -print0 \
            | xargs -0 -r sed -i 's/\r$//' || true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: |
          python -m pip install --upgrade pip
          pip install yamllint

      - name: Run yamllint
        run: |
          yamllint -c .yamllint .github/workflows starter/.github/workflows .github/dependabot.yml
