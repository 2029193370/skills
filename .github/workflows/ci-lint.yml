name: CI - YAML Lint

on:
  pull_request:
    branches: ['main']
    paths:
      - '.github/workflows/**'
      - '.yamllint'
      - '.yamllint.yml'
      - 'starter/**'
  push:
    branches: ['main']
    paths:
      - '.github/workflows/**'
      - '.yamllint'
      - '.yamllint.yml'
      - 'starter/**'

permissions:
  contents: read

jobs:
  yamllint:
    name: Yamllint for workflow files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Normalize workflow line endings (CRLF -> LF)
        run: |
          find .github/workflows -type f \( -name "*.yml" -o -name "*.yaml" \) -print0 \
            | xargs -0 -r sed -i 's/\r$//' || true

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: |
          python -m pip install --upgrade pip
          pip install yamllint

      - name: Run yamllint
        run: |
          yamllint -c .yamllint .github/workflows starter/.github/workflows .github/dependabot.yml
