# --------------------------------------------------------------
# OPTIONAL: consumer-repo Dependabot template.
# Copy this file to `.github/dependabot.yml` in your own repo
# ONLY IF you want Dependabot to manage YOUR application
# dependencies (npm / pip / maven / ...).
#
# You DO NOT need to track the ci-templates workflow itself:
# the `uses: ...@v2` reference in .github/workflows/ci.yml is
# a sliding major tag - release-please in the ci-templates repo
# fast-forwards it for you automatically.
#
# Design goals of this template:
# - At most ONE PR per ecosystem per week (noise control).
# - Major / minor / patch grouped together - review once.
# - Lower open-PR limit to avoid bootstrap PR storms.
# --------------------------------------------------------------
version: 2
updates:
  # --- Your application dependencies ---------------------------
  # Delete the ecosystem blocks you do NOT need.
  # Dependabot silently skips an ecosystem if its manifest is
  # absent (e.g. no package.json), so leaving extras is harmless
  # but adds log noise on the Insights page.

  - package-ecosystem: 'npm'
    directory: '/'
    schedule: { interval: 'weekly', day: 'monday' }
    open-pull-requests-limit: 3
    labels: ['dependencies', 'npm']
    commit-message: { prefix: 'chore(deps)' }
    groups:
      npm-all:
        patterns: ['*']
        update-types: ['minor', 'patch']

  - package-ecosystem: 'pip'
    directory: '/'
    schedule: { interval: 'weekly', day: 'monday' }
    open-pull-requests-limit: 3
    labels: ['dependencies', 'python']
    commit-message: { prefix: 'chore(deps)' }

  # --- Your OWN inline GitHub Actions (NOT ci-templates) -------
  # Only enable this block if you add extra `uses:` lines in your
  # own workflow files. If your workflow just references
  # ci-templates, LEAVE THIS BLOCK COMMENTED OUT.
  #
  # - package-ecosystem: 'github-actions'
  #   directory: '/'
  #   schedule: { interval: 'weekly', day: 'monday' }
  #   open-pull-requests-limit: 2
  #   labels: ['dependencies', 'github-actions']
  #   commit-message: { prefix: 'chore(deps)' }
  #   groups:
  #     all-actions:
  #       patterns: ['*']
  #       update-types: ['major', 'minor', 'patch']
