name: CI & Security Scan

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    # Pin at the sliding major tag so you receive compatible updates automatically.
    # Pin at an exact tag (e.g. @v2.0.0) if you need fully reproducible builds.
    uses: 2029193370/ci-templates/.github/workflows/reusable-ci.yml@v2
    # Uncomment what you need. Every input is optional and auto-defaults.
